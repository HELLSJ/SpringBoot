<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客登录页</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body>
    <div class="nav">
        <img src="pic/logo2.jpg" alt="">
        <span class="blog-title">我的博客系统</span>
        <div class="space"></div>
        <a class="nav-span" href="blog_list.html">主页</a>
        <a class="nav-span" href="blog_edit.html">写博客</a>
    </div>

    <div class="container-login">
        <div class="login-dialog">
            <h3>登录</h3>
            <div class="row">
                <span>用户名</span>
                <input type="text" name="username" id="username" placeholder="请输入用户名">
            </div>
            <div class="row">
                <span>密码</span>
                <input type="password" name="password" id="password" placeholder="请输入密码">
            </div>
            <div class="row">
                <button id="submit" onclick="login()">登录</button>
            </div>
            <div class="login-tips">
                <a href="javascript:void(0)" onclick="forgotPassword()">忘记密码？</a>
                <a href="blog_register.html">还没有账号？立即注册</a>
            </div>
        </div>
    </div>
    <script src="js/jquery.min.js"></script>
    <script>
        function login() {
            var username = $("#username").val();
            var password = $("#password").val();
            
            if (!username || !password) {
                alert("用户名和密码不能为空");
                return;
            }
            
            $.ajax({
                type:"post",
                url: "/user/login",
                data:{
                    username: username,
                    password: password
                },
                success:function(result){
                    if(result.code=="SUCCESS" && result.data !=null){
                        //后端处理成功
                        localStorage.setItem("user_token", result.data);
                        //页面跳转
                        location.href = "blog_list.html";
                    }else{
                        alert(result.errMsg || "登录失败");
                    }
                },
                error: function() {
                    alert("登录请求失败，请稍后重试");
                }
            });
        }
        
        function forgotPassword() {
            alert("忘记密码功能即将上线，请联系管理员");
        }
        
        // 回车键登录
        $(document).keydown(function(event) {
            if (event.keyCode === 13) {
                login();
            }
        });
    </script>
</body>

</html>
